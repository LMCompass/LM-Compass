name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: lm-compass/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: lm-compass

      - name: Run lint
        run: npm run lint
        working-directory: lm-compass

      - name: Run tests
        run: npm run test
        working-directory: lm-compass